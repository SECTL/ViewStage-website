<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载 - ViewStage</title>
    <link rel="icon" type="image/svg+xml" href="SECTL-LOGO.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="download.css">
</head>
<body>
    <header class="vp-navbar">
        <a href="https://sectl.top" class="vp-navbar-logo" target="_blank">
            <img src="SECTL-LOGO.svg" alt="ViewStage Logo">
        </a>
        <div class="vp-navbar-items-wrapper">
            <nav class="vp-navbar-items">
                <div class="vp-navbar-item">
                    <a href="index.html">首页</a>
                </div>
                <div class="vp-navbar-item">
                    <a href="download.html" class="route-link-active">下载</a>
                </div>
                <div class="vp-navbar-item">
                    <a href="/docs">文档站</a>
                </div>
            </nav>
        </div>
        <button class="vp-toggle-color-mode-button" aria-label="切换主题"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg></button>
    </header>

    <main class="download-page">
        <div class="download-header">
            <h1 class="download-title">下载 ViewStage</h1>
        </div>

        <div class="download-main-content">
            <div class="download-left-column">
                <div class="download-card version-card">
                    <h2 class="card-title">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        版本信息
                    </h2>
                    <div class="version-info" id="version-info">
                        <div class="info-row">
                            <span class="info-label">版本号</span>
                            <span class="info-value" id="version-number">加载中...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">发布日期</span>
                            <span class="info-value" id="publish-date">加载中...</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">支持平台</span>
                            <span class="info-value" id="supported-platforms">加载中...</span>
                        </div>
                    </div>
                </div>

                <div class="download-card options-card" id="download-options-card">
                    <h2 class="card-title">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        下载选项
                    </h2>

                    <div id="download-options-placeholder" class="options-placeholder">
                        <div class="options-loading">
                            <div class="loading-spinner"></div>
                            <span>正在获取下载信息...</span>
                        </div>
                    </div>

                    <div class="download-options" id="download-options" style="display:none">
                        <div class="option-group">
                            <label class="option-label">选择平台</label>
                            <div class="option-buttons" id="platform-selector" role="radiogroup" aria-label="选择平台"></div>

                        </div>

                        <div class="option-group" id="arch-group" style="display:none">
                            <label class="option-label">选择架构</label>
                            <div class="option-buttons" id="arch-selector" role="radiogroup" aria-label="选择架构"></div>
                        </div>

                        <div class="option-group">
                            <label class="option-label">选择格式</label>
                            <div class="option-buttons" id="format-selector" role="radiogroup" aria-label="选择格式"></div>
                        </div>
                    </div>

                    <div class="option-group mirror-group">
                        <label class="option-label">下载源</label>
                        <div class="option-buttons" id="mirror-selector" role="radiogroup" aria-label="选择下载源"></div>
                    </div>

                    <div class="download-action" id="download-action" style="display:none">
                        <a href="#" class="download-button" id="download-button" target="_blank">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            <span id="download-button-text">下载</span>
                            <span class="file-size-badge" id="file-size-badge"></span>
                        </a>
                        <div class="download-meta" id="download-meta"></div>
                    </div>

                    <div class="download-error" id="download-error" style="display:none">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                        <span>该版本暂无可用下载文件</span>
                    </div>
                </div>

                <div class="download-actions-secondary">
                    <a href="https://github.com/SECTL/ViewStage/releases" class="action-btn secondary" target="_blank">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                        前往 GitHub 发布页面
                    </a>
                    <a href="https://developer.microsoft.com/zh-cn/microsoft-edge/webview2/?form=MA13LH#download" class="action-btn secondary" target="_blank">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        安装 WebView2 运行时
                    </a>
                </div>
            </div>

            <div class="download-right-column">
                <div class="download-card changelog-card">
                    <h2 class="card-title">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        版本亮点
                    </h2>
                    <div class="changelog-content" id="changelog-content">
                        <p class="changelog-loading">加载中...</p>
                    </div>
                </div>
            </div>
        </div>

        <section class="version-list-section">
            <div class="version-list-header">
                <h2 class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    所有版本
                </h2>
                <span class="version-list-count" id="version-list-count"></span>
            </div>
            <div class="version-list" id="version-list">
                <div class="version-list-loading">
                    <div class="loading-spinner"></div>
                    <span>加载版本列表...</span>
                </div>
            </div>
        </section>
    </main>

    <footer class="vp-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <img src="SECTL-LOGO.svg" alt="ViewStage" class="footer-logo">
                <p class="footer-tagline">SECTL</p>
            </div>
            <div class="footer-links">
                <div class="footer-column">
                    <h4>产品</h4>
                    <a href="/download.html">下载</a>
                    <a href="/docs">文档</a>
                </div>
                <div class="footer-column">
                    <h4>社区</h4>
                    <a href="https://sectl.top" target="_blank">SECTL</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© <span id="current-year"></span> SECTL. All rights reserved.</p>
        </div>
    </footer>
    <script src="main.js"></script>
    <script src="download.js"></script>
</body>
</html>
